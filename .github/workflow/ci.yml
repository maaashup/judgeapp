name: CI

on:
  push:
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm -r install

      - name: Prisma generate
        run: pnpm --filter @judge/db prisma:generate

      - name: Typecheck API (basic)
        run: pnpm --filter @judge/api exec tsc -p tsconfig.json --noEmit