<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Events
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  @if (events.length === 0) {
  <div class="container">
    <strong>No Events Found</strong>
  </div>
  }

  @for (event of events; track event) {

  <a class="event-link" [routerLink]="['/','events','event-page', event.name]">
    <div class="event-container">
      <div class="event-name">
        {{ event.name }}
      </div>

      <div class="event-date">
        {{ event.date }}
      </div>

      <div class="event-format">
        {{ event.format }}
      </div>

      <div class="event-game">
        {{ event.game }}
      </div>

      <div class="event-country">
        {{ event.country }}
      </div>
    </div>
  </a>

  }

  <div class="createBtn">
    <img src="assets/icon/add-circle-24px.svg" alt="Create Event">
  </div>


</ion-content>
